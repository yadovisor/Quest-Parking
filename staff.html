<!DOCTYPE html>
<html lang="ja">
<head>
<base target="_top">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>駐車場フロント入力</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{--ink:#1C1F23;--line:#D8DCE0;--field:#F5F6F7;--sign:#0B5FA5;--full:#B3261E;--muted:#6E767E;
    --num:'Barlow Semi Condensed',system-ui,sans-serif}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Noto Sans JP',system-ui,sans-serif;color:var(--ink);background:#fff;
    line-height:1.6;padding:16px;-webkit-font-smoothing:antialiased}
  .wrap{max-width:560px;margin:0 auto}
  .bar{background:#FBF7EC;border:1px solid #E8DFC5;border-radius:2px;padding:8px 12px;
    font-size:12px;color:#8A5A00;margin-bottom:16px}
  h1{font-size:16px;font-weight:700;border-bottom:2px solid var(--ink);padding-bottom:8px;margin-bottom:16px}
  h1 span{font-size:12px;color:var(--muted);font-weight:400;margin-left:8px}
  .row{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;margin-bottom:16px}
  .fld{flex:1;min-width:180px}
  label{display:block;font-size:12px;font-weight:500;margin-bottom:4px}
  input,textarea{width:100%;border:1px solid var(--line);border-radius:2px;padding:10px 12px;
    font-family:inherit;font-size:16px;color:var(--ink)}
  input:focus,textarea:focus{outline:none;border-color:var(--sign);box-shadow:0 0 0 3px rgba(11,95,165,.15)}
  textarea{min-height:52px;resize:vertical}
  .counts{display:flex;gap:6px;flex-wrap:wrap}
  .counts button{flex:1;min-width:44px;border:1px solid var(--line);background:#fff;padding:10px 0;
    font-family:var(--num);font-size:18px;font-weight:700;border-radius:2px;cursor:pointer;color:var(--ink)}
  .counts button[aria-pressed="true"]{background:var(--sign);border-color:var(--sign);color:#fff}
  .nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
  .nav b{font-family:var(--num);font-size:17px}
  .nav button{border:1px solid var(--line);background:#fff;width:34px;height:34px;border-radius:2px;cursor:pointer}
  .nav button:disabled{opacity:.3}
  .dow{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;font-size:10px;color:var(--muted);text-align:center}
  .dow span:first-child{color:var(--full)}.dow span:last-child{color:var(--sign)}
  .grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-top:2px}
  .cell{aspect-ratio:1/1.05;border:1px solid var(--line);border-radius:2px;background:#fff;display:flex;
    flex-direction:column;align-items:center;justify-content:center;cursor:pointer;font-family:inherit;color:var(--ink)}
  .cell .d{font-family:var(--num);font-size:12px;color:var(--muted);line-height:1}
  .cell .n{font-family:var(--num);font-size:18px;font-weight:700;line-height:1.1}
  .cell.empty{border:none;cursor:default}
  .cell.off{background:var(--field);color:#B8BEC4;cursor:default}
  .cell.off .d,.cell.off .n{color:#B8BEC4}
  .cell.full{cursor:default;color:var(--full);border-color:#F0C9C6;
    background:repeating-linear-gradient(-45deg,#FDF3F2 0 6px,#FBE8E6 6px 12px)}
  .cell.full .n{font-size:12px}
  .cell.sel{background:var(--sign);border-color:var(--sign);color:#fff}
  .cell.sel .d,.cell.sel .n{color:#fff}
  .loading{text-align:center;color:var(--muted);font-size:12px;padding:32px 0}
  .sum{border:1px solid var(--line);background:var(--field);border-radius:2px;padding:10px 14px;
    margin:14px 0;font-size:13px;min-height:44px;display:flex;align-items:center;justify-content:space-between}
  .sum b{font-family:var(--num);font-size:20px}
  .go{width:100%;background:var(--sign);color:#fff;border:none;border-radius:2px;padding:15px;
    font-size:16px;font-weight:700;cursor:pointer;font-family:inherit}
  .go:disabled{background:#9AA3AB}
  .msg{padding:12px 14px;font-size:13px;border-radius:2px;margin-top:12px}
  .msg.err{background:#FDF3F2;border:1px solid #F0C9C6;color:var(--full)}
  .msg.ok{background:#F1F6FA;border:1px solid #C5DAEA;color:var(--sign)}

  /* ---- 送信中オーバーレイ ---- */
  .ov{position:fixed;inset:0;background:rgba(255,255,255,.88);display:none;
    align-items:center;justify-content:center;flex-direction:column;z-index:9999}
  .ov.on{display:flex}
  .ov .sp{width:44px;height:44px;border:4px solid var(--line);border-top-color:var(--sign);
    border-radius:50%;animation:spin .8s linear infinite}
  .ov p{margin-top:16px;font-size:14px;font-weight:700;color:var(--ink)}
  .ov p .en{display:block;font-size:11px;font-weight:400;color:var(--muted);margin-top:3px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .msg.ok .num{font-family:var(--num);font-weight:700;font-size:15px}
</style>
</head>
<body>
<div class="ov" id="ov"><div class="sp"></div><p>登録しています<span style="display:block;font-size:12px;font-weight:400;color:#6E767E;margin-top:4px">数秒お待ちください</span></p></div>
<div class="wrap">
  <div class="bar">フロント代行入力画面です。お客様には共有しないでください。電話予約をこの画面から登録できます。</div>
  <h1><span id="cfg-facility"></span> 駐車場<span>フロント入力（電話予約）</span></h1>

  <div class="row">
    <div class="fld" style="flex:2">
      <label for="name">お名前（代表者名・カナ推奨）</label>
      <input id="name" autocomplete="off" placeholder="例：ヤマダ タロウ">
    </div>
  </div>

  <div class="fld" style="margin-bottom:16px">
    <label>台数</label>
    <div class="counts" id="counts" role="group" aria-label="台数"></div>
  </div>

  <div class="fld" style="margin-bottom:8px">
    <label>利用日（連続しない日も選択可。チェックアウト日は含めない）</label>
    <div class="nav">
      <button id="prev" aria-label="前の月">◀</button>
      <b id="ym"></b>
      <button id="next" aria-label="次の月">▶</button>
    </div>
    <div class="dow"><span>日</span><span>月</span><span>火</span><span>水</span><span>木</span><span>金</span><span>土</span></div>
    <div class="grid" id="grid"><div class="loading">読み込み中</div></div>
  </div>

  <div class="sum" id="sum"><span style="color:#6E767E">日付未選択</span></div>

  <div class="fld" style="margin-bottom:16px">
    <label for="note">受付メモ（任意・車種やナンバー、電話番号など）</label>
    <textarea id="note" placeholder="例：白プリウス 品川300 / 当日18時着予定 / TEL 090-xxxx"></textarea>
  </div>

  <button class="go" id="go">この内容で登録する</button>
  <div id="msg"></div>
</div>

<script>
  // ===== 案Z：GAS APIの呼び出し口 =====
  const API_URL = 'https://script.google.com/macros/s/AKfycbwu2E3Q9009WS3-OREz_Ck3nvA7wAxXL5wDFYIzmls0XlI2Sg0cQIjmIkO6TK3JtbUI/exec';
  function api(action, data){
    return fetch(API_URL, { method: 'POST', body: JSON.stringify(Object.assign({ action: action }, data || {})) })
      .then(function(r){ return r.json(); });
  }
  let CFG = null;
  const st = { count:1, sel:new Set(), avail:{}, cur:null, busy:false };
  const pad = n => ('0'+n).slice(-2);
  const key = (y,m,d) => y+'-'+pad(m+1)+'-'+pad(d);
  const jp = s => { const p=s.split('-'); return +p[1]+'/'+(+p[2]); };

  let counts, minYM, maxYM;
  function initApp(){

  counts = document.getElementById('counts');
  for(let i=1;i<=CFG.maxCount;i++){
    const b=document.createElement('button');
    b.textContent=i; b.setAttribute('aria-pressed', i===1?'true':'false');
    b.onclick=()=>{ st.count=i; st.sel.clear();
      [...counts.children].forEach(c=>c.setAttribute('aria-pressed', c===b?'true':'false')); render(); };
    counts.appendChild(b);
  }

  minYM=CFG.minDate.slice(0,7); maxYM=CFG.maxDate.slice(0,7);
  st.cur=minYM;
  document.getElementById('prev').onclick=()=>move(-1);
  document.getElementById('next').onclick=()=>move(1);
  function move(step){ const [y,m]=st.cur.split('-').map(Number);
    const d=new Date(y,m-1+step,1); const ym=d.getFullYear()+'-'+pad(d.getMonth()+1);
    if(ym<minYM||ym>maxYM) return; st.cur=ym; load(); }

  function load(){
    document.getElementById('grid').innerHTML='<div class="loading">読み込み中</div>';
    api('availability', { ym: st.cur })
      .then(r=>{ if(!r || !r.ok) throw 0; st.avail=Object.assign(st.avail, r.availability); render(); })
      .catch(()=>{ document.getElementById('grid').innerHTML='<div class="loading">読み込み失敗。再読み込みしてください。</div>'; });
  }

  function render(){
    const [y,m]=st.cur.split('-').map(Number);
    document.getElementById('ym').textContent=y+'年'+m+'月';
    document.getElementById('prev').disabled=(st.cur<=minYM);
    document.getElementById('next').disabled=(st.cur>=maxYM);
    const first=new Date(y,m-1,1), days=new Date(y,m,0).getDate();
    const g=document.getElementById('grid'); g.innerHTML='';
    for(let i=0;i<first.getDay();i++){ const e=document.createElement('div'); e.className='cell empty'; g.appendChild(e); }
    for(let d=1;d<=days;d++){
      const k=key(y,m-1,d), rem=st.avail[k];
      const b=document.createElement('button'); b.className='cell';
      if(rem===undefined){ b.className+=' off'; b.disabled=true; b.innerHTML='<span class="d">'+d+'</span><span class="n">–</span>'; }
      else if(rem<st.count){ b.className+=' full'; b.disabled=true; b.innerHTML='<span class="d">'+d+'</span><span class="n">満</span>'; }
      else { if(st.sel.has(k)) b.className+=' sel';
        b.innerHTML='<span class="d">'+d+'</span><span class="n">'+rem+'</span>';
        b.onclick=()=>{ st.sel.has(k)?st.sel.delete(k):st.sel.add(k); render(); }; }
      g.appendChild(b);
    }
    const list=[...st.sel].sort();
    document.getElementById('sum').innerHTML = list.length
      ? '<span>'+list.map(jp).join('・')+'　'+st.count+'台</span><b>'+(list.length*st.count*CFG.price).toLocaleString()+' 円</b>'
      : '<span style="color:#6E767E">日付未選択</span>';
  }

  document.getElementById('go').onclick=()=>{
    if(st.busy) return;
    const name=document.getElementById('name').value.trim();
    const dates=[...st.sel].sort();
    if(!name){ show('err','お名前を入力してください。'); return; }
    if(!dates.length){ show('err','利用日を選んでください。'); return; }
    st.busy=true; const go=document.getElementById('go'); go.disabled=true; go.textContent='登録中';
    document.getElementById('ov').classList.add('on');
    document.getElementById('msg').innerHTML='';
    api('staffCreate', { payload: { name:name, count:st.count, dates:dates, note:document.getElementById('note').value.trim() } })
      .then(r=>{
        st.busy=false; go.disabled=false; go.textContent='この内容で登録する';
        document.getElementById('ov').classList.remove('on');
        if(r && r.ok){
          show('ok','<span class="num">'+r.id+'</span> で登録しました。'+r.datesJp.join('・')+' / '+r.count+'台 / '+r.total.toLocaleString()+'円（現地払い）');
          st.sel.clear(); document.getElementById('name').value=''; document.getElementById('note').value='';
          st.count=1; [...counts.children].forEach((c,i)=>c.setAttribute('aria-pressed', i===0?'true':'false'));
          load();
        } else { show('err', (r && r.message) || 'エラーが発生しました。'); }
      })
      .catch(()=>{ st.busy=false; go.disabled=false; go.textContent='この内容で登録する';
        document.getElementById('ov').classList.remove('on');
        show('err','登録できませんでした。もう一度お試しください。'); });
  };

  load();

  } // ---- initApp ここまで ----

  function show(kind,html){ document.getElementById('msg').innerHTML='<div class="msg '+kind+'">'+html+'</div>'; }

  api('config').then(function(c){
    if(!c || !c.ok) throw 0;
    CFG = c;
    document.getElementById('cfg-facility').textContent = CFG.facility;
    document.title = CFG.facility + ' 駐車場フロント入力';
    initApp();
  }).catch(function(){
    document.getElementById('grid').innerHTML =
      '<div class="loading">読み込めませんでした。時間をおいて再読み込みしてください。</div>';
  });
</script>
</body>
</html>
